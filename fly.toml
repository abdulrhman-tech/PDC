# Bayt Alebaa PDC — Fly.io configuration
# Region: bah (Bahrain) — closest to Saudi Arabia for low latency

app = "bayt-alebaa-pdc"
primary_region = "bah"

[build]

[env]
  DJANGO_SETTINGS_MODULE = "pdc_backend.settings.production"
  DEBUG = "False"
  ALLOWED_HOSTS = "*"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1

[[restart]]
  policy = "always"
