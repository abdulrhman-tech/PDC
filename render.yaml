services:
  - type: web
    name: bayt-alebaa-pdc
    runtime: python
    pythonVersion: "3.11"
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r data_center/pdc_backend/requirements.txt &&
      cd data_center/pdc_frontend && npm install && npm run build
    startCommand: >
      cd data_center/pdc_backend &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn pdc_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      # ── Django ──────────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: pdc_backend.settings.production
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        sync: false

      # ── Database (Neon PostgreSQL pooler) ───────────────────
      - key: NEON_DATABASE_URL
        value: "postgresql://neondb_owner:npg_8XpNFuyj7AdM@ep-dry-breeze-a1buqqso-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"

      # ── Redis (Upstash) ──────────────────────────────────────
      - key: REDIS_URL
        sync: false

      # ── Cloudflare R2 ────────────────────────────────────────
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_TOKEN
        sync: false

      # ── AI APIs ──────────────────────────────────────────────
      - key: OPENAI_API_KEY_PDC
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: KIE_AI_API_KEY
        sync: false
      - key: REMOVEBG_API_KEY
        sync: false

      # ── SAP Integration ──────────────────────────────────────
      - key: SAP_ACTIVE_ENV
        value: PRD
      - key: SAP_USERNAME
        sync: false
      - key: SAP_PASSWORD
        sync: false
      - key: SAP_PROXY_URL
        sync: false
      - key: SAP_PROXY_SECRET
        sync: false
